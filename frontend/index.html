<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Task Manager</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <div class="navbar">

<div class="logo">
<i class="fa-solid fa-list-check"></i>
Smart Task Manager
</div>

<div class="nav-right">
<a href="#dashboard" class="nav-item">Dashboard</a>
<a href="#tasks" class="nav-item">Tasks</a>
<a href="#analytics-section" class="nav-item">Analytics</a>
<a href="#" class="nav-item" onclick="loadHistory()">History</a>
<a href="#" class="nav-item" onclick="logout()">Logout</a>
</div>

</div>

<!-- <h1>Smart Task Manager</h1> -->

<div class="container">

<!-- Add Task Section -->

<div class="add-task">

<h2>Add Task</h2>

<input id="title" placeholder="Task title">

<input id="deadline" type="datetime-local">

<button onclick="addTask()">Add Task</button>

</div>

<!-- Dashboard Layout -->

<div class="dashboard" id="dashboard">

<!-- Task List -->

<div class="tasks-section" id="tasks">

<div class="tasks-wrapper">

<div class="task-card">

<h2>Today's Tasks</h2>
<ul id="todayTasks"></ul>

</div>

<div class="task-card">

<h2 id="yesterdayTitle" style="display:none;">
Yesterday's Pending Tasks
</h2>

<ul id="yesterdayTasks"></ul>

</div>

</div>

</div>

<!-- Analytics -->

<div class="analytics-section" id="analytics-section">

<h2>Analytics</h2>

<button onclick="loadAnalytics()">Load Analytics</button>

<div id="analytics"></div>

<canvas id="analyticsChart" width="250" height="250"></canvas>

</div>

</div>

<div id="history-section" style="display:none; margin-top:30px;">
<h2>Task History</h2>
<ul id="historyList"></ul>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
